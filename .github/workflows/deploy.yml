name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress deploy when new commit arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build with auto base path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compute base path
        id: basepath
        run: |
          # Auto-rileva base path da GITHUB_REPOSITORY (es. user/repo -> /repo/)
          REPO="${GITHUB_REPOSITORY#*/}"
          # se è un repo user.github.io, base path è "/"
          if [[ "$REPO" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with VITE_BASE_PATH
        env:
          VITE_BASE_PATH: ${{ steps.basepath.outputs.base }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
